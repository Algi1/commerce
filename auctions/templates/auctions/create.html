{% extends "auctions/layout.html" %}

{% block body %}
    <h2>Create New Listing</h2>

    <form action="{% url 'create' %}" method="POST">
        {% csrf_token %}
        <div class="form-group">
            <label for="title">Enter Title</label>
            <input name="title" type="text" class="form-control" id="title" placeholder="Enter title">
          </div>
          <div class="input-group">
            <div class="input-group-prepend">
              <span class="input-group-text" id="basic-addon1">£</span>
            </div>
            <input name="starting_price" type="number" class="form-control" placeholder="starting_price" aria-label="starting_price" aria-describedby="basic-addon1">
          </div>
          <div class="form-group">
            <label for="image">Image:</label>
            <input type="file" class="form-control" id="image" name="image" required>
        </div>
          <div class="form-check">
            <input class="form-check-input" type="checkbox" value="" id="flexCheckChecked" checked>
            <label name="is_active" class="form-check-label" for="flexCheckChecked">
              Checked checkbox
            </label>
          </div>
          <div class="form-group">
            <label for="cars">Choose a category:</label>
            <select name="category" id="category">
                {% for category in categories %}
                <option value="volvo">{{ category }}</option>
                {% endfor %}
                
            </select>
        
          </div>
          <button type="submit" class="btn btn-primary">Create listing</button>

    </form>
{% endblock %}
